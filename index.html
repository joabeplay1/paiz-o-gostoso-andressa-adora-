<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criador de Apps IA</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <aside class="sidebar">

    <h2>CRIADOR DE APPS IA</h2>

    <div class="api-box">
      <label>Chave Gemini API</label>
      <input id="api-key-input" type="password" placeholder="Cole sua API">
    </div>

    <div class="input-box">
      <label>Descreva seu app</label>
      <textarea id="user-input" placeholder="Digite sua ideia"></textarea>
    </div>

    <button id="btn-generate">GERAR APP</button>

    <div id="error-box"></div>

    <div class="tabs">

      <button id="tab-btn-prompt"
              class="tab-btn active"
              onclick="switchTab('prompt')">

        Prompt

      </button>

      <button id="tab-btn-code"
              class="tab-btn"
              onclick="switchTab('code')">

        Código

      </button>

    </div>

    <div id="tab-content-prompt" class="tab-content">
      <textarea id="output-prompt" readonly></textarea>
    </div>

    <div id="tab-content-code"
         class="tab-content"
         style="display:none">

      <textarea id="output-code" readonly></textarea>

    </div>

  </aside>


  <main class="preview-area">

    <div class="device-controls">

      <button class="device-btn"
              onclick="changeDevice('mobile')">
        📱 Mobile
      </button>

      <button class="device-btn"
              onclick="changeDevice('tablet')">
        📟 Tablet
      </button>

      <button class="device-btn"
              onclick="changeDevice('desktop')">
        💻 Desktop
      </button>

      <button class="device-btn"
              onclick="toggleFullscreen()">
        📺 Tela Cheia
      </button>

    </div>


    <div id="device-simulator"
         class="device-desktop">

      <iframe id="app-preview"
              sandbox="allow-scripts allow-forms">
      </iframe>

    </div>

  </main>

</div>

<script src="app.js"></script>

</body>
</html>
